<h2>Shopping Lists (Test)</h2>

<button (click)="create()" [disabled]="creating">
  {{ creating ? "Creating..." : "Create New List" }}
</button>

<button (click)="loadLists()" [disabled]="loadingLists">
  {{ loadingLists ? "Loading..." : "Refresh Lists" }}
</button>

<ul>
  <li *ngFor="let l of lists">
    <button (click)="selectList(l.listID)">
      Open List {{ l.listID }}
    </button>
  </li>
</ul>

<hr />

<div *ngIf="listID">
  <h3>Selected List: {{ listID }}</h3>

  <h4>Add item</h4>
  <input placeholder="name" [(ngModel)]="newName" />
  <input placeholder="quantity" type="number" [(ngModel)]="newQty" />
  <button (click)="add()" [disabled]="adding || !newName">
    {{ adding ? "Adding..." : "Add" }}
  </button>

  <h4>Items</h4>
  <button (click)="load()" [disabled]="loading">
    {{ loading ? "Loading..." : "Refresh Items" }}
  </button>

  <ul>
    <li *ngFor="let item of items">
      <input type="checkbox" [checked]="item.checked" (change)="toggle(item, $event)" />
      {{ item.name }} ({{ item.quantity ?? "n/a" }})
      <button (click)="del(item)">Delete</button>
    </li>
  </ul>
</div>

<div *ngIf="error">
  <p><strong>Error:</strong> {{ error }}</p>
</div>
