<div class="container my-4">
  <div class="row g-4">
    <!-- LEFT: Shopping List tester -->
    <div class="col-12 col-lg-6">
      <div class="card paper shadow-sm">
        <div class="card-body">
          <h2 class="paper-title mb-3">Shopping Lists (Test)</h2>

          <div class="d-flex gap-2 flex-wrap mb-3">
            <button class="btn btn-primary" (click)="create()" [disabled]="creating">
              {{ creating ? "Creating..." : "Create New List" }}
            </button>

            <span class="text-muted" *ngIf="loadingLists">Loading lists...</span>
          </div>

          <div class="mb-3">
            <div class="d-flex flex-wrap gap-2">
              <button
                class="btn btn-outline-dark btn-sm"
                *ngFor="let l of lists"
                (click)="selectList(l.listID)"
                [class.active]="l.listID === listID"
              >
                List {{ l.listID }}
              </button>
            </div>
          </div>

          <hr />

          <div *ngIf="listID; else noList">
            <h5 class="mb-2">Selected List: {{ listID }}</h5>

            <div class="add-area pt-3">
              <h6 class="mb-2">Add item</h6>
              <div class="d-flex gap-2 flex-wrap">
                <input class="form-control" style="max-width: 220px" placeholder="name" [(ngModel)]="newName" />
                <input class="form-control" style="max-width: 140px" placeholder="qty" type="number" [(ngModel)]="newQty" />
                <button class="btn btn-success" (click)="addToShoppingList()" [disabled]="adding || !newName">
                  {{ adding ? "Adding..." : "Add" }}
                </button>
              </div>
            </div>

            <div class="mt-3">
              <h6 class="mb-2">Items</h6>
              <div class="text-muted mb-2" *ngIf="loading">Loading items...</div>

              <div class="paper-line" *ngFor="let item of items">
                <div class="d-flex align-items-center justify-content-between gap-2">
                  <div class="d-flex align-items-center gap-3">
                    <input class="form-check-input big-check" type="checkbox" [checked]="item.checked" (change)="toggle(item, $event)" />
                    <span class="item-text" [class.checked]="item.checked">
                      {{ item.name }} ({{ item.quantity ?? "n/a" }})
                    </span>
                  </div>

                  <button class="btn btn-outline-danger btn-sm" (click)="del(item)">Delete</button>
                </div>
              </div>
            </div>
          </div>

          <ng-template #noList>
            <p class="text-muted mb-0">Create a list to begin.</p>
          </ng-template>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger mt-4">
    <strong>Error:</strong> {{ error }}
  </div>
</div>
