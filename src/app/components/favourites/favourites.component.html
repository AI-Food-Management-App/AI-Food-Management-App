<h2>Favorite Recipes</h2>

<button (click)="load()" [disabled]="loading">
  {{ loading ? "Loading..." : "Refresh" }}
</button>

<div *ngIf="error">
  <p><strong>Error:</strong> {{ error }}</p>
</div>

<ul>
  <li *ngFor="let fav of favorites">
    <a [routerLink]="['/recipe', fav.recipeId]">{{ fav.title }}</a>
    <img *ngIf="fav.image" [src]="fav.image" alt="fav image" width="150" />
    <button (click)="remove(fav.recipeId)">Remove</button>
  </li>
</ul>
