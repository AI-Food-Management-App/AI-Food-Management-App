<h2>Upload / Scan Food Label</h2>

<input type="file" accept="image/*" capture="environment" (change)="onFile($event)" />

<div *ngIf="previewUrl">
  <p>Preview:</p>
  <img [src]="previewUrl" alt="preview" width="250" />
</div>

<button (click)="detectAndSave()" [disabled]="!selectedFile || loading">
  {{ loading ? "Processing..." : "Detect & Save" }}
</button>

<div *ngIf="detectedIngredient">
  <p><strong>Detected:</strong> {{ detectedIngredient }}</p>
</div>

<div *ngIf="error">
  <p><strong>Error:</strong> {{ error }}</p>
</div>

<hr />

<h3>My Fridge Ingredients (from DB)</h3>
<button (click)="loadFridge()" [disabled]="loadingFridge">
  {{ loadingFridge ? "Loading..." : "Refresh Fridge" }}
</button>

<ul>
  <li *ngFor="let item of fridgeItems">
    {{ item.name }}
  </li>
</ul>
