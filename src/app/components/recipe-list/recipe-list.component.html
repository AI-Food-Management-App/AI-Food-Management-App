<h2>Recipes</h2>

<button (click)="loadFromFridge()" [disabled]="loading">
  {{ loading ? "Loading..." : "Load recipes from my fridge" }}
</button>

<div *ngIf="ingredientsUsed.length">
  <p><strong>Using ingredients:</strong> {{ ingredientsUsed.join(", ") }}</p>
</div>

<div *ngIf="error">
  <p><strong>Error:</strong> {{ error }}</p>
</div>

<ul>
  <li *ngFor="let recipe of recipes">
    <a [routerLink]="['/recipe', recipe.id]">{{ recipe.title }}</a>
    <div *ngIf="recipe.image">
      <img [src]="recipe.image" alt="recipe image" width="200" />
    </div>
  </li>
</ul>
