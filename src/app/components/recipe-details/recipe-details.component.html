<h2>Recipe Details</h2>

<div *ngIf="loading">Loading...</div>
<div *ngIf="error">
  <p><strong>Error:</strong> {{ error }}</p>
</div>

<div *ngIf="recipe">
  <h3>{{ recipe.title }}</h3>
  <img *ngIf="recipe.image" [src]="recipe.image" alt="recipe image" width="250" />

  <p><strong>Ready in:</strong> {{ recipe.readyInMinutes }} minutes</p>
  <p><strong>Servings:</strong> {{ recipe.servings }}</p>

  <button (click)="favorite()" [disabled]="favLoading">Favorite</button>
  <button (click)="unfavorite()" [disabled]="favLoading">Unfavorite</button>

  <h4>Ingredients</h4>
  <ul>
    <li *ngFor="let ing of recipe.extendedIngredients">
      {{ ing.name }} - {{ ing.amount }} {{ ing.unit }}
    </li>
  </ul>

  <h4>Steps</h4>
  <ol>
    <li *ngFor="let step of steps">
      {{ step.step }}
    </li>
  </ol>
</div>
