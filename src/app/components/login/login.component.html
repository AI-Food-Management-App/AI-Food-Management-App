<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm border-0 w-100" style="max-width: 420px;">
    <div class="card-body p-4 p-md-5">

      <h2 class="fw-bold mb-1">Welcome back</h2>
      <p class="text-muted mb-4">Sign in to your M.ai Food account</p>

      <div *ngIf="errorMsg" class="alert alert-danger py-2">{{ errorMsg }}</div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input
            formControlName="email"
            type="email"
            class="form-control"
            [class.is-invalid]="f['email'].invalid && f['email'].touched"
            placeholder="you@example.com"
          />
          <div class="invalid-feedback">{{ getError('email') }}</div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input
            formControlName="password"
            type="password"
            class="form-control"
            [class.is-invalid]="f['password'].invalid && f['password'].touched"
            placeholder="Your password"
          />
          <div class="invalid-feedback">{{ getError('password') }}</div>
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100 rounded-pill py-2 fw-semibold"
          [disabled]="loading"
        >
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>

      </form>

      <p class="text-center text-muted mt-3 mb-0">
        Don't have an account? <a routerLink="/register">Register</a>
      </p>

    </div>
  </div>
</div>
